openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Fit Finder API - AI-powered outfit builder
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: outfits
    description: Outfit generation and management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /outfits/generate:
    post:
      operationId: generateOutfits
      tags: [outfits]
      summary: Generate outfit looks with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOutfitsRequest"
      responses:
        "200":
          description: Generated outfit looks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOutfitsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /outfits/model-image:
    post:
      operationId: generateModelImage
      tags: [outfits]
      summary: Generate a model image for a look
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateModelImageRequest"
      responses:
        "200":
          description: Generated model image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateModelImageResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /outfits/saved:
    get:
      operationId: getSavedOutfits
      tags: [outfits]
      summary: Get saved outfits
      responses:
        "200":
          description: List of saved outfits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedOutfitsResponse"

  /outfits/saved/{id}:
    get:
      operationId: getSavedOutfit
      tags: [outfits]
      summary: Get a saved outfit by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved outfit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedOutfit"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteSavedOutfit
      tags: [outfits]
      summary: Delete a saved outfit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /outfits/save:
    post:
      operationId: saveOutfit
      tags: [outfits]
      summary: Save an outfit look
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveOutfitRequest"
      responses:
        "200":
          description: Outfit saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedOutfit"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UserSizes:
      type: object
      properties:
        top:
          type: string
          description: Top size (XS/S/M/L/XL/2XL)
        bottom:
          type: string
          description: Bottom/pants size
        shoes:
          type: string
          description: Shoe size (US)
        dress:
          type: string
          description: Dress size

    Hotspot:
      type: object
      description: Position of an item on the model image (percentage coordinates)
      properties:
        xPct:
          type: number
          description: X position as percentage of image width (0-100)
        yPct:
          type: number
          description: Y position as percentage of image height (0-100)
      required:
        - xPct
        - yPct

    GenerateOutfitsRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Outfit idea or inspiration text
        numLooks:
          type: integer
          description: Number of distinct looks to generate (default 3)
          default: 3
        userSizes:
          $ref: "#/components/schemas/UserSizes"
      required:
        - prompt

    GenerateModelImageRequest:
      type: object
      properties:
        look:
          $ref: "#/components/schemas/OutfitLook"
        userSizes:
          $ref: "#/components/schemas/UserSizes"
      required:
        - look

    GenerateModelImageResponse:
      type: object
      properties:
        lookId:
          type: string
        modelImageB64:
          type: string
          description: Base64-encoded PNG of model wearing the outfit
        hotspots:
          type: array
          items:
            $ref: "#/components/schemas/ItemHotspot"
      required:
        - lookId
        - modelImageB64
        - hotspots

    ItemHotspot:
      type: object
      properties:
        itemIndex:
          type: integer
          description: Index of the item in the look's items array
        category:
          type: string
        xPct:
          type: number
        yPct:
          type: number
      required:
        - itemIndex
        - category
        - xPct
        - yPct

    OutfitItem:
      type: object
      properties:
        category:
          type: string
          description: "Category: Top, Bottom, Dress, Shoes, Bag, Jewelry, Accessories, Makeup, Hair"
        name:
          type: string
        brand:
          type: string
        description:
          type: string
        price:
          type: number
        purchaseUrl:
          type: string
          description: Direct retailer URL to purchase this item
        imageUrl:
          type: string
        color:
          type: string
      required:
        - category
        - name
        - brand
        - description
        - price
        - purchaseUrl
        - color

    OutfitLook:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        vibe:
          type: string
        totalCost:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutfitItem"
        styleNotes:
          type: string
        modelImageB64:
          type: string
          description: Base64 model image (populated after calling model-image endpoint)
        hotspots:
          type: array
          items:
            $ref: "#/components/schemas/ItemHotspot"
      required:
        - id
        - title
        - vibe
        - totalCost
        - items
        - styleNotes

    GenerateOutfitsResponse:
      type: object
      properties:
        prompt:
          type: string
        looks:
          type: array
          items:
            $ref: "#/components/schemas/OutfitLook"
        userSizes:
          $ref: "#/components/schemas/UserSizes"
      required:
        - prompt
        - looks

    SaveOutfitRequest:
      type: object
      properties:
        prompt:
          type: string
        look:
          $ref: "#/components/schemas/OutfitLook"
        userSizes:
          $ref: "#/components/schemas/UserSizes"
      required:
        - prompt
        - look

    SavedOutfit:
      type: object
      properties:
        id:
          type: integer
        prompt:
          type: string
        look:
          $ref: "#/components/schemas/OutfitLook"
        userSizes:
          $ref: "#/components/schemas/UserSizes"
        savedAt:
          type: string
          format: date-time
      required:
        - id
        - prompt
        - look
        - savedAt

    SavedOutfitsResponse:
      type: object
      properties:
        outfits:
          type: array
          items:
            $ref: "#/components/schemas/SavedOutfit"
      required:
        - outfits
